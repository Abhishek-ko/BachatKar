<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BachatKar | Price Comparison</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>🛒 BachatKar</h1>
            <p>Compare prices instantly</p>
        </header>

        <div class="search-section">
            <input type="text" id="userInput" placeholder="Type product name (e.g. iPhone 15)...">
            <button id="searchBtn">Find Best Price</button>
        </div>

        <div id="resultsList">
            <p class="placeholder-text">Your deals will appear here!</p>
        </div>

        <hr>
        
        <h3>❤️ Saved for Later</h3>
        <div id="savedList">
            <p class="placeholder-text">No saved items yet.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
